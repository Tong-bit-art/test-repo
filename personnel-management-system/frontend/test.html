<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #303133;
            margin-bottom: 20px;
        }
        p {
            color: #606266;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>人员库管理系统 - 测试页面</h1>
        <p>如果您能看到这个页面，说明网络和浏览器都正常工作。</p>
        <p>请检查浏览器控制台是否有错误信息。</p>
        <p>当前时间：<span id="time"></span></p>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
